<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Создать портфолио</title>
<link rel="stylesheet" href="css/style.css">
</head>
<body>
<header>
<h1>Создать портфолио 🫰</h1>
<a href="index.html" class="button">Назад к ленте</a>
</header>
<main>
<form id="portfolio-form">
  <input type="text" placeholder="Ник" id="nickname" required>
  <input type="text" placeholder="Должность" id="role" required>
  <textarea placeholder="Коротко о себе" id="bio" required></textarea>
  <input type="text" placeholder="Название проекта" id="project-title" required>
  <input type="text" placeholder="Ссылка на проект" id="project-link" required>
  <input type="text" placeholder="Скриншоты (через запятую)" id="project-screenshots" required>
  <button type="submit" class="button">Создать портфолио</button>
</form>
</main>
<script src="js/portfolio.js"></script>
</body>
</html>
